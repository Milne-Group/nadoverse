name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install nadoverse with all extras
        run: pip install -e ".[all,dev]"

      - name: nado doctor
        run: nado doctor

      - name: pytest
        run: pytest tests/ -v

  registry-only:
    # Smoke test: bare install (no extras) — registry and CLI import without errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -c "from nadoverse.registry import REGISTRY; print(len(REGISTRY), 'tools')"
      - run: nado --help
      - run: pytest tests/test_registry.py -v
